    <main class="contactos__box" data-aos="zoom-in" data-aos-duration="1000">
        <form action="#" method=# class="contactos__form">
            <h2>Por favor dejanos tus datos para poder contactarnos con vos.</h2>
            <div class="contactos__fieldset">
            <fieldset >
                <div class="contactos__divfiel">
                <legend><p>Informacion Personal</p></legend>
                <label for="condition"> Cliente</label>
                <input type="checkbox" name="mandatory" id="condition"  value="1" >
                <label for="condition"> Empresa</label>
                <input type="checkbox" name="mandatory" id="condition"  value="2" >
                <br><br>
                <label for="infopersonal">Nombre: </label>
                    <input type="text" name="usarname" id="infopersonal" placeholder="Nombre"></input>
                <br><br>
                <label for="infopersonal">Apellido: </label>
                    <input type="text" name="usarname" id="infopersonal" placeholder="Apellido"></input>
                    <br><br>
                <label for="infopersonal">Email: </label>
                    <input type="email" name="usarname" id="infopersonal" placeholder="Email" required></input>
                    <br><br>
                <label for="comentario">Agrege su comentario</label>
                <br>
                <textarea name="txt" id="comentario" cols="40" rows="9"></textarea>
                <br><br>
                <label for="infopersonal">Que redes sociales utiliza? </label>
                    <select name="Redes" id="infopersonal">
                        <option value="" disabled selected>Seleccione</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Twitter">Twitter</option>
                    </select>
                    <br>
                <label for="Promocion">Dejenos su red social favorita si desea recibir descuentos exclusivos: </label>
                    <input type="text" name="usarname" id="infopersonal"></input>
                <br><br>
                <input type="submit" value="Enviar"></input>
                <input type="reset" value="Borrar"></input> 
                </div>      
            </fieldset>
            </div>
        </form>
